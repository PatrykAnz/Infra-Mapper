name: Build and deploy Node.js app to Azure Web App - cloud-task-manager-frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: "https://infra-mapper-96160-fmg7dwe0e4fpcyfg.polandcentral-01.azurewebsites.net"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E233AE417EC94224B1FF2FAC957CE130 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A359209235C247C3920C3DFB308F51AF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_19624CDFB05D41789C445A835F988D9E }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: "infra-mapper-frontend-96160"
          package: dist
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"
